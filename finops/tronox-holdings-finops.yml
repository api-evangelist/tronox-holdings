principles:
  - name: Visibility
    description: Spend visibility is established via the customer's procurement system and invoice review;
      no provider-side usage API or cost dashboard is published.
  - name: Allocation
    description: Allocate Tronox spend through your purchase-order system; assign POs to product lines
      and plants as they are issued.
  - name: Optimization
    description: Optimization is a procurement function — volume commitments, contract terms, and product
      grade selection — negotiated directly with Tronox sales.
  - name: Accountability
    description: Accountability sits with the procurement and operations leaders responsible for the contract;
      there is no metered cost-owner concept.
